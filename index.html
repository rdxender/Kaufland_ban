<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banner Preview</title>
<style>
body { font-family: Arial; background: #f5f5f5; padding: 40px; }
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
}

.banner {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.banner h3 { margin:0 0 10px 0; font-size:14px; color:#333; }
.placeholder { display:flex; align-items:center; justify-content:center; background:#eee; border:1px dashed #ccc; color:#777; }
iframe { border:1px solid #ddd; }
</style>
</head>
<body>

<h1>Campaign Preview</h1>
<p>Klikni na banner pro spuštění animace.</p>
<div class="grid" id="grid"></div>

<script>
fetch("banners.json")
.then(r=>r.json())
.then(data=>{
    const grid = document.getElementById("grid");
    data.banners.forEach(folder => {
        // Vezme rozměr jen z první části názvu (před _)
        let sizeMatch = folder.match(/^(\d+)x(\d+)/);
        let width=300, height=250;
        if(sizeMatch){
            width=parseInt(sizeMatch[1]);
            height=parseInt(sizeMatch[2]);
        }

        const el=document.createElement("div");
        el.className="banner";
        el.innerHTML = `
            <h3>${folder}</h3>
            <div class="placeholder" style="width:${width}px;height:${height}px">
                klikni pro spuštění
            </div>
        `;

        el.onclick = ()=>{
            el.innerHTML = `
                <h3>${folder}</h3>
                <iframe src="${folder}/index.html" width="${width}" height="${height}" scrolling="no" frameborder="0"></iframe>
            `;
        };
        grid.appendChild(el);
    });
});
</script>

</body>
</html>
